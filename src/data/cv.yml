# RenderCV YAML format — https://docs.rendercv.com/
# Used by the CV page when site.cv.format is 'rendercv'.

cv:
  name: Albert Einstein
  location: Princeton, NJ
  email: einstein@example.com
  phone: tel:+1-000-000-0000
  website: https://example.github.io
  summary: A German-born theoretical physicist widely regarded as one of the greatest scientists of all time. Best known for developing the theory of relativity, the most important pillar along with quantum mechanics of modern physics.
  social_networks:
    - network: GitHub
      username: example
    - network: LinkedIn
      username: example

  sections:
    education:
      - institution: University of Zurich
        area: Physics
        degree: PhD
        start_date: 1900
        end_date: 1905
        highlights:
          - 'Thesis: "A New Determination of Molecular Dimensions"'
          - 'Supervisor: Alfred Kleiner'

      - institution: ETH Zurich
        area: Mathematics and Physics Teaching Diploma
        degree: Diploma
        start_date: 1896
        end_date: 1900

    experience:
      - company: Institute for Advanced Study
        position: Professor
        location: Princeton, NJ
        start_date: 1933
        end_date: present
        highlights:
          - Developed unified field theory research program
          - Mentored generations of physicists and mathematicians
          - Contributed to foundations of quantum mechanics debates

      - company: University of Berlin
        position: Professor and Director
        location: Berlin, Germany
        start_date: 1914
        end_date: 1933
        highlights:
          - Developed the general theory of relativity (1915)
          - Predicted gravitational waves and black holes
          - Awarded Nobel Prize in Physics (1921)

      - company: University of Zurich
        position: Associate Professor
        location: Zurich, Switzerland
        start_date: 1909
        end_date: 1911

      - company: Swiss Patent Office
        position: Technical Expert (Third Class)
        location: Bern, Switzerland
        start_date: 1902
        end_date: 1909
        highlights:
          - Evaluated patent applications while conducting independent research
          - Published four landmark papers in 1905 (Annus Mirabilis)

    publications:
      - title: 'On the Electrodynamics of Moving Bodies'
        authors:
          - Albert Einstein
        doi: 10.1002/andp.19053221004
        date: 1905-06
        journal: Annalen der Physik

      - title: 'Does the Inertia of a Body Depend Upon Its Energy Content?'
        authors:
          - Albert Einstein
        doi: 10.1002/andp.19053231314
        date: 1905-09
        journal: Annalen der Physik

      - title: 'Can Quantum-Mechanical Description of Physical Reality Be Considered Complete?'
        authors:
          - Albert Einstein
          - Boris Podolsky
          - Nathan Rosen
        doi: 10.1103/PhysRev.47.777
        date: 1935-05
        journal: Physical Review

      - title: 'On the General Theory of Relativity'
        authors:
          - Albert Einstein
        date: 1915-11
        journal: Prussian Academy of Sciences

    awards:
      - name: Nobel Prize in Physics
        date: '1921'
        issuer: Royal Swedish Academy of Sciences
        highlights:
          - 'For services to theoretical physics, and especially for his discovery of the law of the photoelectric effect'

      - name: Copley Medal
        date: '1925'
        issuer: Royal Society

      - name: Max Planck Medal
        date: '1929'
        issuer: German Physical Society

    skills:
      - label: Theoretical Physics
        details: General Relativity, Special Relativity, Quantum Mechanics, Statistical Mechanics
      - label: Mathematics
        details: Differential Geometry, Tensor Calculus, Riemannian Geometry
      - label: Languages
        details: German (native), English (fluent), French (proficient)

    interests:
      - label: Music
        details: Violin, Mozart, Bach
      - label: Philosophy
        details: Spinoza, Mach, Kant
      - label: Sailing
        details: Long Island Sound, Swiss lakes
